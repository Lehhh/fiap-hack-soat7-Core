name: Build and Deploy app in Kubernetes

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'releases/**'
      - 'feature/**'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup kubectl for EKS
        run: |
          aws eks --region us-east-1 update-kubeconfig --name eks-cluster

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region us-east-1 || \
          docker login --username AWS --password-stdin ${{ vars.ECR_REPOSITORY_URL }}/$(echo ${{ vars.IMAGE_CORE }})

      - name: Create ECR repository
        run: |
          aws ecr describe-repositories --repository-names ${{ vars.ECR_REPOSITORY_URL }}${{ vars.IMAGE_CORE }} --region us-east-1 || \
          aws ecr create-repository --repository-name ${{ vars.ECR_REPOSITORY_URL }}${{ vars.IMAGE_CORE }} --region us-east-1

      - name: Create Kubernetes namespace
        run: kubectl create namespace ${{ secrets.NAMESPACE }} || true

      - name: Build Docker image
        run: docker build -t $${{ vars.ECR_REPOSITORY_URL }}${{ vars.IMAGE_CORE }}:1.0.0 .

      - name: Push Docker image to ECR
        run: docker push ${{ vars.ECR_REPOSITORY_URL }}${{ vars.IMAGE_CORE }}:1.0.0

      -
        name: Create Secrets DB
        run: |
          kubectl create secret generic postgres-secret \
          --from-literal=postgres-user=${{ secrets.POSTGRES_USER }} \
          --from-literal=postgres-password=${{ secrets.POSTGRES_PASSWORD }} \
          --from-literal=postgres-db=${{ secrets.POSTGRES_DB }} \
          --from-literal=postgres-service=${{ secrets.POSTGRES_SERVICE }} \
          --from-literal=postgres-port=${{ secrets.POSTGRES_PORT }} \
          --namespace ${{ secrets.NAMESPACE }}

      - name: Apply Kubernetes pv
        working-directory: .kube/app
        run: kubectl apply -f app-pv.yaml --namespace ${{ secrets.NAMESPACE }}

      - name: Apply Kubernetes pvc
        working-directory: .kube/app
        run: kubectl apply -f app-pvc.yaml --namespace ${{ secrets.NAMESPACE }}

      - name: Apply Kubernetes deployment
        working-directory: .kube/app
        run: kubectl apply -f app-deployment.yaml --namespace ${{ secrets.NAMESPACE }}

      - name: Apply Kubernetes service
        working-directory: .kube/app
        run: kubectl apply -f app-service.yaml --namespace ${{ secrets.NAMESPACE }}

      - name: Apply Kubernetes ingress
        working-directory: .kube/app
        run: kubectl apply -f app-ingress.yaml --namespace ${{ secrets.NAMESPACE }}

