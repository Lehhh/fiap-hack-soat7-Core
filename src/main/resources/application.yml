spring:
  servlet:
    multipart:
      max-file-size: 400MB
      max-request-size: 400MB
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

br.com.fiap.soat7:
  redis-mid-url: ${REDIS_MID_URL}
  upload:
    dir: ${SHARED_DISK}/%s/%s/%s/
server:
  port: 8080
