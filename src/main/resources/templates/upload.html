<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload de Vídeo</title>
    <link rel="stylesheet" href="/webjars/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f4f7f6;
        }
        .upload-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .progress {
            height: 30px;
        }
        .progress-bar {
            height: 100%;
            background-color: #007bff;
        }
    </style>
</head>
<body>
<div class="upload-container">
    <h2 class="text-center">Upload de Vídeo</h2>
    <form id="uploadForm" enctype="multipart/form-data">
        <div class="form-group">
            <label for="file">Escolha o arquivo</label>
            <input type="file" id="file" name="file" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Enviar</button>
    </form>

    <div class="progress mt-4" style="display:none;" id="progressBarContainer">
        <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
    </div>

    <div id="progressPercentage" class="mt-2" style="display:none;">0%</div>

    <div id="uploadStatus" class="mt-3"></div>
</div>

<script src="/webjars/jquery/3.5.1/jquery.min.js"></script>
<script src="/webjars/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script>
    // Função para enviar o arquivo via AJAX
    $('#uploadForm').submit(function(e) {
        e.preventDefault();

        var formData = new FormData(this);
        var progressBar = $('#progressBar');
        var progressBarContainer = $('#progressBarContainer');
        var progressPercentage = $('#progressPercentage');
        var uploadStatus = $('#uploadStatus');
        var submitButton = $(this).find('button[type="submit"]');

        // Desativar o botão de enviar
        submitButton.prop('disabled', true);

        // Mostrar a barra de progresso e a porcentagem
        progressBarContainer.show();
        progressPercentage.show();

        $.ajax({
            url: '/upload',  // URL do endpoint para upload
            type: 'POST',
            data: formData,
            processData: false,
            contentType: false,
            xhr: function() {
                var xhr = new XMLHttpRequest();
                xhr.upload.addEventListener('progress', function(e) {
                    if (e.lengthComputable) {
                        var percent = (e.loaded / e.total) * 100;
                        progressBar.css('width', percent + '%');
                        progressPercentage.text(Math.round(percent) + '%');
                    }
                });
                return xhr;
            },
            success: function(response) {
                // Atualiza o estado de upload com a resposta do servidor
                uploadStatus.html('<div class="alert alert-success">' + response + '</div>');
                progressBar.css('width', '100%');
                progressPercentage.text('100%');
            },
            error: function(xhr, stage, error) {
                // Em caso de erro, mostra uma mensagem de erro
                uploadStatus.html('<div class="alert alert-danger">Erro ao fazer o upload. Tente novamente!</div>');
            },
            complete: function() {
                // Habilitar o botão de enviar após o upload (sucesso ou erro)
                submitButton.prop('disabled', false);
            }
        });
    });
</script>
</body>
</html>
